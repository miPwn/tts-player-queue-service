name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-22.04

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate deployment contract
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PUSH_BEFORE_SHA: ${{ github.event.before }}
      run: |
        BASE_REF=""
        if [ "$EVENT_NAME" = "pull_request" ]; then
          BASE_REF="$PR_BASE_SHA"
        else
          BASE_REF="$PUSH_BEFORE_SHA"
        fi
        python3 scripts/validate_deployment_contract.py --check-changed --base-ref "$BASE_REF"

    - name: Test deployment tooling
      run: python3 -m unittest tests.test_deployment_tools

    - name: Build release bundles
      run: python3 scripts/build_release_bundle.py

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          git \
          pkg-config \
          libpulse-dev \
          libevent-dev \
          libssl-dev \
          pulseaudio \
          netcat \
          clang-tidy

    - name: Start PulseAudio
      run: |
        pulseaudio --start --exit-idle-time=-1
        pactl info

    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@v3
      with:
        path: |
          /usr/local/lib
          /usr/local/include
        key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-deps-

    - name: Build and install C++ dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        # hiredis
        git clone https://github.com/redis/hiredis.git /tmp/hiredis
        cd /tmp/hiredis
        make
        sudo make install

        # redis-plus-plus
        git clone https://github.com/sewenew/redis-plus-plus.git /tmp/redis-plus-plus
        cd /tmp/redis-plus-plus
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        sudo make install

        # AMQP-CPP
        git clone https://github.com/CopernicaMarketingSoftware/AMQP-CPP.git /tmp/amqp-cpp
        cd /tmp/amqp-cpp
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release \
              -DAMQP-CPP_BUILD_SHARED=ON \
              -DAMQP-CPP_LINUX_TCP=ON ..
        make -j$(nproc)
        sudo make install

        # spdlog
        git clone https://github.com/gabime/spdlog.git /tmp/spdlog
        cd /tmp/spdlog
        mkdir build && cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)
        sudo make install

        # Update library cache
        sudo ldconfig

    - name: Install header-only libraries
      run: |
        # cpp-httplib (use v0.14.3 - stable version with multipart support)
        sudo mkdir -p /usr/local/include
        wget https://raw.githubusercontent.com/yhirose/cpp-httplib/v0.14.3/httplib.h \
          -O /tmp/httplib.h
        sudo cp /tmp/httplib.h /usr/local/include/

        # nlohmann/json (use v3.11.3 - stable version)
        sudo mkdir -p /usr/local/include/nlohmann
        wget https://raw.githubusercontent.com/nlohmann/json/v3.11.3/single_include/nlohmann/json.hpp \
          -O /tmp/json.hpp
        sudo cp /tmp/json.hpp /usr/local/include/nlohmann/

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
              -DBUILD_TESTING=OFF ..

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Verify services are ready
      run: |
        echo "Waiting for services to be ready..."

        # Wait for Redis
        for i in {1..30}; do
          if nc -z localhost 6379 2>/dev/null; then
            echo "✓ Redis is ready"
            break
          fi
          echo "Waiting for Redis... ($i/30)"
          sleep 2
        done

        # Wait for RabbitMQ
        for i in {1..30}; do
          if nc -z localhost 5672 2>/dev/null; then
            echo "✓ RabbitMQ is ready"
            break
          fi
          echo "Waiting for RabbitMQ... ($i/30)"
          sleep 2
        done

        # Check PulseAudio
        pactl info || echo "⚠️  PulseAudio may not be available (tests may be skipped)"

    - name: Run tests
      env:
        RABBITMQ_HOST: localhost
        RABBITMQ_PORT: 5672
        RABBITMQ_USER: guest
        RABBITMQ_PASSWORD: guest
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        CACHE_SIZE: 10
        LOG_LEVEL: 2
      run: |
        cd build
        ctest --output-on-failure --verbose

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/Testing/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tts-playback-service-${{ github.sha }}
        path: build/tts_playback_service

    - name: Upload release bundles
      uses: actions/upload-artifact@v4
      with:
        name: tts-player-queue-release-bundles
        path: dist/release-bundles/

  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-22.04
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image digest
      run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install clang-tidy
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy

    - name: Run clang-tidy
      run: |
        echo "Running clang-tidy on source files..."
        find src include -name "*.cpp" -o -name "*.h" | xargs clang-tidy -p build || true
        echo "✓ clang-tidy analysis complete"

    - name: Check file formatting
      run: |
        echo "Checking for trailing whitespace..."
        if grep -r --include="*.cpp" --include="*.h" '[[:blank:]]$' src/ include/; then
          echo "⚠️  Warning: Found trailing whitespace (not failing build)"
        else
          echo "✓ No trailing whitespace found"
        fi

    - name: Check for TODO/FIXME comments
      run: |
        echo "Scanning for TODO/FIXME comments..."
        grep -rn --include="*.cpp" --include="*.h" -E "TODO|FIXME" src/ include/ || true

    - name: Verify documentation exists
      run: |
        test -f README.md || (echo "README.md missing" && exit 1)
        test -f docs/INDEX.md || (echo "docs/INDEX.md missing" && exit 1)
        test -f docs/api/API.md || (echo "API documentation missing" && exit 1)
        echo "✓ All required documentation present"

    - name: Check CMakeLists.txt syntax
      run: |
        echo "Validating CMakeLists.txt..."
        if cmake --help-command project > /dev/null 2>&1; then
          echo "✓ CMake is available"
          echo "✓ CMakeLists.txt syntax check skipped (requires full build)"
        fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner (Table format)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'

    - name: Run Trivy vulnerability scanner (JSON for artifact)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'json'
        output: 'trivy-results.json'

    - name: Upload Trivy results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-security-results
        path: trivy-results.json

    - name: Display scan summary
      if: always()
      run: |
        echo "✓ Security scan completed"
        echo "Results uploaded as artifact 'trivy-security-results'"
        echo "Note: SARIF upload to Security tab requires GitHub Advanced Security"
