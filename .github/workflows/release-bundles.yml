name: TTS Queue Release Bundles

on:
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  bundle:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate deployment contract
      run: python3 scripts/validate_deployment_contract.py

    - name: Test deployment tooling
      run: python3 -m unittest tests.test_deployment_tools

    - name: Build release bundles
      run: python3 scripts/build_release_bundle.py

    - name: Upload release bundles
      uses: actions/upload-artifact@v4
      with:
        name: tts-player-queue-release-bundles-${{ github.run_id }}
        path: dist/release-bundles/
