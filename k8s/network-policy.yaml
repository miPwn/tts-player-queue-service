apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tts-network-policy
  namespace: tts-production
spec:
  podSelector:
    matchLabels:
      app: tts-playback
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx-ingress
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 5672
